<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Birthday - Manoj Prabahar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Initial Loading Screen -->
    <div class="loader-overlay" id="loader">
        <div class="glitch-loader" data-text="INITIALIZING SYSTEM...">INITIALIZING SYSTEM...</div>
    </div>

    <!-- Background matrix rain effect -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Background particles and mouse trails -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Music Controls -->
    <div class="music-controls">
        <button id="musicToggle" class="neon-btn">
            <span id="musicIcon">▶</span> Music
        </button>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" class="volume-slider"
            title="Volume">
    </div>

    <audio id="bgMusic" loop>
        <source src="music/birthday.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Content -->
    <main class="content-container">
        <div class="hero">
            <h1 class="glitch hero-title text-hover-glow" data-text="Happy Birthday Manoj Prabahar 🎉" id="typingText">
            </h1>
            <h2 class="glitch subtitle text-hover-glow" data-text="Celebrating an amazing day – 27 March 2026."
                id="subtitleText"></h2>
        </div>

        <div class="gallery-section">
            <h2 class="neon-heading glitch" data-text="Memory Logs">Memory Logs</h2>
            <div class="slideshow-controls">
                <button id="autoSlideBtn" class="neon-btn btn-small">Start Slideshow</button>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Replace src with your images -->
                <img src="images/photo1.jpg" alt="Memory 1" class="gallery-img img-hover-glow" />
                <img src="images/photo2.jpg" alt="Memory 2" class="gallery-img img-hover-glow" />
                <img src="images/photo3.jpg" alt="Memory 3" class="gallery-img img-hover-glow" />
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImg">
    </div>

    <script src="script.js"></script>
</body>

</html>
